<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود به پنل ادمین</title>
    <style>
        body {
            font-family: Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        input {
            display: block;
            margin: 10px auto;
            padding: 10px;
            width: 200px;
        }
        button {
            padding: 10px 20px;
            background: linear-gradient(to left, #570615, #3A2F33);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: linear-gradient(to left, #773344, #D44D5C);
            transition: 0.15s;
        }
        .error {
            color: red;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>ورود به پنل مدیریت</h2>
    <input type="text" id="username" placeholder="نام کاربری">
    <input type="password" id="password" placeholder="رمز عبور">
    <button onclick="checkLogin()">ورود</button>
    <p class="error" id="errorMsg">نام کاربری یا رمز عبور اشتباه است!</p>
</div>

<script>
    function checkLogin() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        //password and username
        if (user === 'RBK-Admin00' && pass === '22-02-1405') {
          
            window.location.href = 'edit.html';
        } else {
    
            document.getElementById('errorMsg').style.display = 'block';
        }
    }
</script>

</body>
</html>
